<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App · Front-End Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        /* Input Area */
        .todo-input-area {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        #todo-input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }

        #todo-input:focus {
            outline: none;
            border-color: #667eea;
        }

        #add-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        #add-btn:hover {
            background: #5a67d8;
        }

        /* Stats */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #f0f0f0;
            color: #666;
            font-size: 0.9rem;
        }

        /* Todo List */
        .todo-list {
            list-style: none;
            margin-bottom: 1.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            background: #f9f9f9;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            transition: transform 0.1s;
        }

        .todo-item:hover {
            background: #f0f0f0;
        }

        .todo-checkbox {
            width: 22px;
            height: 22px;
            margin-right: 1rem;
            cursor: pointer;
        }

        .todo-text {
            flex: 1;
            font-size: 1rem;
            color: #333;
            word-break: break-word;
        }

        .todo-text.completed {
            text-decoration: line-through;
            color: #999;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        /* Clear All Button */
        .clear-btn {
            width: 100%;
            background: #f3f4f6;
            color: #6b7280;
            border: none;
            padding: 0.75rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #e5e7eb;
            color: #374151;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            color: #999;
            padding: 2rem;
        }

        @media (max-width: 500px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.5rem;
            }
            .todo-input-area {
                flex-direction: column;
            }
            #add-btn {
                padding: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Todo App</h1>
        
        <div class="todo-input-area">
            <input type="text" id="todo-input" placeholder="What do you need to do?" autocomplete="off">
            <button id="add-btn">Add Task</button>
        </div>

        <div class="stats">
            <span id="total-count">Total: 0</span>
            <span id="completed-count">Completed: 0</span>
        </div>

        <ul class="todo-list" id="todo-list">
            <li class="empty-state">✨ Add your first task above</li>
        </ul>

        <button class="clear-btn" id="clear-btn">Clear All Completed</button>
    </div>

    <script>
        // Get DOM elements
        const todoInput = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');
        const clearBtn = document.getElementById('clear-btn');
        const totalCountSpan = document.getElementById('total-count');
        const completedCountSpan = document.getElementById('completed-count');

        // Load todos from localStorage
        let todos = [];

        function loadTodos() {
            const stored = localStorage.getItem('todos');
            if (stored) {
                todos = JSON.parse(stored);
            }
        }

        // Save todos to localStorage
        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // Update stats (total and completed counts)
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(todo => todo.completed).length;
            totalCountSpan.textContent = `Total: ${total}`;
            completedCountSpan.textContent = `Completed: ${completed}`;
        }

        // Render the todo list
        function renderTodos() {
            if (todos.length === 0) {
                todoList.innerHTML = '<li class="empty-state">✨ Add your first task above</li>';
                updateStats();
                return;
            }

            todoList.innerHTML = '';
            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = 'todo-item';
                
                // Checkbox
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'todo-checkbox';
                checkbox.checked = todo.completed;
                checkbox.addEventListener('change', () => toggleTodo(index));
                
                // Todo text
                const span = document.createElement('span');
                span.className = `todo-text ${todo.completed ? 'completed' : ''}`;
                span.textContent = todo.text;
                
                // Delete button
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', () => deleteTodo(index));
                
                li.appendChild(checkbox);
                li.appendChild(span);
                li.appendChild(deleteBtn);
                todoList.appendChild(li);
            });
            
            updateStats();
        }

        // Add a new todo
        function addTodo() {
            const text = todoInput.value.trim();
            if (text === '') {
                alert('Please enter a task');
                return;
            }
            
            todos.push({
                text: text,
                completed: false
            });
            
            saveTodos();
            renderTodos();
            todoInput.value = '';
            todoInput.focus();
        }

        // Toggle completed status
        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            saveTodos();
            renderTodos();
        }

        // Delete a todo
        function deleteTodo(index) {
            todos.splice(index, 1);
            saveTodos();
            renderTodos();
        }

        // Clear all completed todos
        function clearCompleted() {
            todos = todos.filter(todo => !todo.completed);
            saveTodos();
            renderTodos();
        }

        // Event listeners
        addBtn.addEventListener('click', addTodo);
        clearBtn.addEventListener('click', clearCompleted);
        
        // Press Enter to add todo
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        // Initialize the app
        loadTodos();
        renderTodos();
    </script>
</body>
</html>
